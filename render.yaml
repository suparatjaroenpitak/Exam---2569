databases:
  - name: exam-app-db
    databaseName: examapp
    user: examapp
    region: singapore
    postgresMajorVersion: "17"

services:
  - type: web
    # Single-service deployment: Next.js app and Python CLI fallback run in one Docker container.
    name: Exam---2569
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: singapore
    autoDeployTrigger: commit
    healthCheckPath: /login
    envVars:
      - key: DATABASE_PROVIDER
        value: postgresql
      - key: DATABASE_URL
        fromDatabase:
          name: exam-app-db
          property: connectionString
      - key: PYTHON_EXEC
        value: python3
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: JWT_SECRET
        generateValue: true
      - key: ENABLE_TRANSFORMER_FALLBACK
        value: "0"
      - key: ALLOW_PYTHON_CLI_FALLBACK
        value: "1"
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: TRANSFORMERS_MODEL
        value: Qwen/Qwen2.5-1.5B-Instruct
      - key: DEFAULT_ADMIN_EMAIL
        sync: false
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false