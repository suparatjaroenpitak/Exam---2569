services:
  - type: web
    name: online-exam-practice-system
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install && npm run build
    startCommand: npm run start
    autoDeployTrigger: commit
    healthCheckPath: /login
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PYTHON_EXEC
        value: python3
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATA_DIR
        value: data
      - key: JWT_SECRET
        generateValue: true
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: TRANSFORMERS_MODEL
        value: Qwen/Qwen2.5-1.5B-Instruct
      - key: TRANSFORMERS_MAX_NEW_TOKENS
        value: "1400"
      - key: TRANSFORMERS_TEMPERATURE
        value: "0.95"
      - key: DEFAULT_ADMIN_EMAIL
        sync: false
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false

# If you move to a paid Render plan later, you can attach a persistent disk and
# mount it at /opt/render/project/src/data without changing the application code.