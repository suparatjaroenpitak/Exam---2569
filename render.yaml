databases:
  - name: exam-app-db
    databaseName: examapp
    user: examapp
    region: singapore
    postgresMajorVersion: "17"

services:
  - type: web
    # If you already created this AI service in Render, keep this name identical to the existing service name.
    name: exam-ai-engine
    runtime: python
    rootDir: ai_engine
    plan: free
    region: singapore
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: ENABLE_TRANSFORMER_FALLBACK
        value: "0"
      - key: TRANSFORMERS_MODEL
        value: Qwen/Qwen2.5-1.5B-Instruct

  - type: web
    # Match the existing production service at https://exam-2569.onrender.com
    name: exam-2569
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install && npx prisma generate && npm run build
    preDeployCommand: npx prisma migrate deploy
    startCommand: npm run start
    autoDeployTrigger: commit
    healthCheckPath: /login
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_PROVIDER
        value: postgresql
      - key: DATABASE_URL
        fromDatabase:
          name: exam-app-db
          property: connectionString
      - key: PYTHON_AI_HOSTPORT
        fromService:
          name: exam-ai-engine
          type: web
          property: hostport
      - key: PYTHON_AI_PUBLIC_URL
        fromService:
          name: exam-ai-engine
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: PYTHON_AI_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ENABLE_TRANSFORMER_FALLBACK
        value: "0"
      - key: ALLOW_PYTHON_CLI_FALLBACK
        value: "0"
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: TRANSFORMERS_MODEL
        value: Qwen/Qwen2.5-1.5B-Instruct
      - key: DEFAULT_ADMIN_EMAIL
        sync: false
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false